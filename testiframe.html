<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <script
      defer
      type="module"
      src="https://b-static.bet-links.com/0.0.2/bam-scripts/bam-scripts.esm.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://b-static.bet-links.com/0.0.2/bam-scripts/bam-scripts.css"
    />
    <style>
      :root {
        --bam-color-brand-primary: #6000d3;
        --bam-color-brand-tertiary: #484848;
        --bam-color-success: #6000d3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, sans-serif;
      }

      .layout {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }

      .main-column {
        flex: 1;
        min-width: 0;
      }

      .right-rail {
        width: 350px;
        flex: 0 0 350px;
      }
    </style>
  </head>
  <body>

    <script>
      window.addEventListener("load", () => {
        const url = "https://go.aff.luvaservices.com/m9l5x636?campaign_id=30680";
        const iframe = document.createElement('iframe');
        iframe.sandbox.add('allow-scripts', 'allow-same-origin');
        iframe.style.width = '1px';
        iframe.style.height = '1px';
        iframe.style.position = 'absolute';
        iframe.style.left = '-9999px';
        iframe.src = url;
        document.body.appendChild(iframe);
        console.log('iframe added');
      });
    </script>

    <h1>Testing Yahoo</h1>
    <div class="layout">
      <main class="main-column">
        <div style="background: #f5f5f5; padding: 16px;display:flex;flex-direction:column;gap:16px">
          <div style="width: 970px; max-height: 250px;">
            <bam-banner
              property-id="2658"
              placement-id="2717"
              context="yahoo-banner">
            </bam-banner>
          </div>
          <div style="width: 970px; max-height: 250px;">
            <bam-trending-parlays
              max-cards="10"
              enable-modal="true"
              odds-type="american">
            </bam-trending-parlays>
          </div>
          <div style="width: 300px; max-height: 600px; background-color: #fff">
            <bam-single-parlays
              max-cards="2"
              size="expanded"
              enable-modal="true"
              odds-type="american">
            </bam-single-parlays>
          </div>
          <div style="width: 300px; max-height: 250px; background-color: #fff">
            <bam-single-parlays
              max-cards="3"
              enable-modal="true"
              odds-type="american">
            </bam-single-parlays>
          </div>
        </div>
      </main>
      <aside class="right-rail">
        <div style="width: 300px; max-height: 600px; background-color: #fff">
          <bam-promotion-list
            property-id="2658"
            placement-id="2717"
            context="yahoo-right-rail"
            max-length="3">
          </bam-promotion-list>
        </div>
      </aside>
    </div>
  </body>
</html>
